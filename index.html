<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корейский с Дунхуа-парнем 🌸</title>
  <style>
    body {
      background: #0f0f1a;
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .game-container {
      width: 100%;
      max-width: 500px;
      height: 650px;
      background: #121214;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .character-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      /* НОВАЯ НАДЕЖНАЯ ССЫЛКА НА КРАСИВОГО АРТ-ПАРНЯ */
      background-image: url('https://raw.githubusercontent.com/Aethelwulf-code/storage/main/dunhua_guy.jpg');
      background-size: cover;
      background-position: center;
    }
    /* Если вдруг и эта ссылка подведет, подстрахуем красивым градиентом */
    .character-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, rgba(26,26,46,0.3), rgba(0,0,0,0.8));
      z-index: 1;
    }
    .center-start-btn {
      background: linear-gradient(135deg, #ff7675, #e84393);
      color: white;
      border: none;
      padding: 20px 40px;
      font-size: 22px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 25px rgba(232, 67, 147, 0.5);
      transition: all 0.3s ease;
      z-index: 10;
      animation: pulse 2s infinite;
    }
    .bubble {
      background: white;
      border-radius: 20px;
      padding: 15px 25px;
      font-size: 22px;
      font-weight: bold;
      color: #333;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      position: absolute;
      top: 40px;
      max-width: 80%;
      text-align: center;
      display: none;
      z-index: 10;
    }
    .guy-bubble::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 10px 10px 0;
      border-style: solid;
      border-color: white transparent;
    }
    .answers-box {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 12px;
      min-height: 180px;
      justify-content: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 10;
    }
    .answer-btn {
      background: white;
      border: none;
      border-radius: 15px;
      padding: 14px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: bold;
      color: #2d3436;
      text-align: center;
    }
    .answer-btn:hover {
      background: #ffeaa7;
      transform: translateY(-2px);
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="game-container">
  <div class="character-box">
    <button id="main-start-btn" class="center-start-btn" onclick="startGame()">
      Начать разговор 🌸
    </button>
    <div id="speech-bubble" class="bubble guy-bubble"></div>
  </div>
  <div id="answers-container" class="answers-box"></div>
</div>

<script>
const dialogue = {
  step1: {
    text: "안녕",
    options: [
      { text: "안녕", nextStep: "step2" },
      { text: "잘 지내요?", nextStep: "error" },
      { text: "미안해요", nextStep: "error" }
    ]
  },
  step2: {
    text: "어떻게 지내요?",
    options: [
      { text: "잘 지내요. 당신은요?", nextStep: "win" },
      { text: "배고파요", nextStep: "error" },
      { text: "가요", nextStep: "error" }
    ]
  },
  win: {
    text: "나도 잘 지내요! 😊\nВы отлично справились!",
    options: []
  },
  error: {
    text: "앗... Ошибка! 🌸\nДавай попробуем ещё раз?",
    options: [
      { text: "Начать заново 🔄", nextStep: "step1" }
    ]
  }
};

function speakKorean(text) {
  const koreanText = text.split("\n").shift().split("😊").shift();
  const utterance = new SpeechSynthesisUtterance(koreanText);
  utterance.lang = 'ko-KR';
  
  // УЛЬТРА-НИЗКИЙ ТОН: заставляем даже женский голос звучать басисто и мужественно
  utterance.pitch = 0.5; 
  utterance.rate = 0.75; // Размеренная мужская речь

  const voices = window.speechSynthesis.getVoices();
  const maleVoice = voices.find(voice => 
    voice.lang.startsWith('ko') && 
    (voice.name.toLowerCase().includes('male') || 
     voice.name.toLowerCase().includes('minsu') || 
     voice.name.toLowerCase().includes('gwangji') ||
     voice.name.toLowerCase().includes('google'))
  );

  if (maleVoice) utterance.voice = maleVoice;
  window.speechSynthesis.speak(utterance);
}

function startGame() {
  document.getElementById("main-start-btn").style.display = "none";
  document.getElementById("speech-bubble").style.display = "block";
  document.getElementById("answers-container").style.display = "flex";
  showStep("step1");
}

function showStep(stepName) {
  const currentData = dialogue[stepName];
  document.getElementById("speech-bubble").innerText = currentData.text;
  
  if (stepName !== "error") {
    speakKorean(currentData.text);
  }
  
  const container = document.getElementById("answers-container");
  container.innerHTML = "";
  
  if (currentData.options.length === 0) {
    const textNode = document.createElement("div");
    textNode.style.color = "white";
    textNode.style.textAlign = "center";
    textNode.style.fontSize = "18px";
    textNode.innerText = "🎉 Потрясающе! Диалог завершён.";
    container.appendChild(textNode);
    return;
  }
  
  currentData.options.forEach(option => {
    const button = document.createElement("button");
    button.className = "answer-btn";
    button.innerText = option.text;
    button.onclick = () => showStep(option.nextStep);
    container.appendChild(button);
  });
}

// Загрузка голосов
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
window.speechSynthesis.getVoices();
</script>

</body>
</html>
